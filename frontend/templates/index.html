<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EditalFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .cargo-card { border-left: 4px solid #0d6efd; }
    .field-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .field-value { font-size: .95rem; white-space: pre-line; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 860px">
    <h1 class="mb-1 fw-bold">EditalFácil</h1>
    <p class="text-muted mb-4">Faça upload de um edital em PDF e receba um resumo estruturado.</p>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form id="upload-form">
          <div class="mb-3">
            <label for="file" class="form-label">Edital em PDF</label>
            <input class="form-control" type="file" id="file" name="file" accept=".pdf" required />
          </div>
          <button type="submit" class="btn btn-primary w-100" id="btn-submit">Processar edital</button>
        </form>
      </div>
    </div>

    <div id="resultado" class="d-none">
      <!-- Dados gerais -->
      <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Informações gerais</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-sm-4">
              <div class="field-label">Cidade / Estado</div>
              <div class="field-value" id="info-cidade">—</div>
            </div>
            <div class="col-sm-4">
              <div class="field-label">Órgão</div>
              <div class="field-value" id="info-orgao">—</div>
            </div>
            <div class="col-sm-4">
              <div class="field-label">Banca</div>
              <div class="field-value" id="info-banca">—</div>
            </div>
            <div class="col-sm-4">
              <div class="field-label">Data da prova</div>
              <div class="field-value" id="info-data-prova">—</div>
            </div>
            <div class="col-sm-8">
              <div class="field-label">Período de inscrição</div>
              <div class="field-value" id="info-periodo">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Cargos -->
      <h5 class="mb-3">Cargos</h5>
      <div id="cargos-lista"></div>
    </div>

    <div id="erro" class="alert alert-danger mt-4 d-none"></div>
  </div>

  <script>
    function val(v) { return v || "—"; }

    function renderCargo(cargo) {
      const area = cargo.area ? `<span class="badge bg-secondary ms-2">${cargo.area}</span>` : "";
      const beneficios = cargo.beneficios
        ? cargo.beneficios.split("\n").map(b => `<li>${b}</li>`).join("")
        : null;

      return `
        <div class="card shadow-sm mb-3 cargo-card">
          <div class="card-body">
            <h6 class="fw-bold mb-3">${val(cargo.nome)}${area}</h6>
            <div class="row g-3">
              <div class="col-sm-4">
                <div class="field-label">Salário</div>
                <div class="field-value">${val(cargo.salario)}</div>
              </div>
              <div class="col-sm-4">
                <div class="field-label">Vagas</div>
                <div class="field-value">${val(cargo.vagas)}</div>
              </div>
              <div class="col-sm-4">
                <div class="field-label">Escolaridade</div>
                <div class="field-value">${val(cargo.escolaridade)}</div>
              </div>
              ${beneficios ? `
              <div class="col-12">
                <div class="field-label">Benefícios</div>
                <ul class="mb-0 ps-3 field-value">${beneficios}</ul>
              </div>` : ""}
            </div>
          </div>
        </div>`;
    }

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.textContent = "Processando…";
      document.getElementById("resultado").classList.add("d-none");
      document.getElementById("erro").classList.add("d-none");

      const formData = new FormData();
      formData.append("file", document.getElementById("file").files[0]);

      try {
        const uploadRes = await fetch("/upload", { method: "POST", body: formData });
        const { job_id, error } = await uploadRes.json();
        if (error) throw new Error(error);

        const resultRes = await fetch(`/editais/${job_id}`);
        const edital = await resultRes.json();

        document.getElementById("info-cidade").textContent = val(edital.cidade_estado);
        document.getElementById("info-orgao").textContent = val(edital.orgao);
        document.getElementById("info-banca").textContent = val(edital.banca);
        document.getElementById("info-data-prova").textContent = val(edital.data_prova);
        document.getElementById("info-periodo").textContent = val(edital.periodo_inscricao);

        const lista = document.getElementById("cargos-lista");
        lista.innerHTML = edital.cargos.length
          ? edital.cargos.map(renderCargo).join("")
          : "<p class='text-muted'>Nenhum cargo encontrado.</p>";

        document.getElementById("resultado").classList.remove("d-none");
      } catch (err) {
        const erroEl = document.getElementById("erro");
        erroEl.textContent = err.message || "Erro ao processar o edital.";
        erroEl.classList.remove("d-none");
      } finally {
        btn.disabled = false;
        btn.textContent = "Processar edital";
      }
    });
  </script>
</body>
</html>
