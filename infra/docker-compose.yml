services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: ../.env
    volumes:
      - ../uploads:/app/uploads
      - ../instance:/app/instance
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
